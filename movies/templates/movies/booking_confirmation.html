<!DOCTYPE html>
<html>
<head>
    <title>Booking Confirmation</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f5f5f5; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; display: inline-block; }
        h1 { color: #4CAF50; }
        p { font-size: 18px; }
        .btn { padding: 10px 20px; background: #4CAF50; color: #fff; text-decoration: none; border-radius: 5px; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Booking Confirmed!</h1>
        <p>An email with your booking details has been sent to <b>{{ booking.email }}</b>.</p>
        <p><b>Movie:</b> {{ booking.movie_name }}</p>
        <p><b>Show Time:</b> {{ booking.show_time }}</p>
        <p><b>Seats:</b> {{ booking.seats }}</p>
        <p><b>Theater:</b> {{ booking.theater }}</p>
        <a href="/" class="btn">Go Back Home</a>
    </div>
</body>
</html>
