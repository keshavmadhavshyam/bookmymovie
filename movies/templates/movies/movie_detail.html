<style>
body {
    font-family: Arial, sans-serif;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.card {
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    padding: 20px;
    border-radius: 10px;
}

.thumbnail {
    position: relative;
    width: 100%;
    max-width: 600px;
    cursor: pointer;
}

.thumbnail img {
    width: 100%;
    border-radius: 10px;
}

.thumbnail:hover img {
    opacity: 0.9;
    transition: 0.3s;
}

.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    color: white;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    padding: 10px 20px;
}

.youtube-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: red;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>


<div class="container">
    <div class="card">

        <h2 style="text-align:center;">{{ movie.title }}</h2>

        <p><b>Rating:</b> {{ movie.rating }}</p>
        <p><b>Release Date:</b> {{ movie.release_date }}</p>

        {% if movie.trailer_id %}

            <!-- Thumbnail with Play Button -->
            <div class="thumbnail" onclick="loadVideo()">
                <img src="https://img.youtube.com/vi/{{ movie.trailer_id }}/0.jpg">
                <div class="play-btn">▶</div>
            </div>

            <p style="color:gray; font-size:14px;">
                Click on the video to watch the trailer
            </p>

            <!-- Video container -->
            <div id="video-container" style="margin-top:20px;"></div>

            <!-- Fallback -->
            <p id="fallback" style="display:none; color:red;">
                Trailer unavailable. Please watch on YouTube.
            </p>

            <!-- YouTube Button -->
            <a href="https://www.youtube.com/watch?v={{ movie.trailer_id }}" 
               target="_blank"
               class="youtube-btn">
                Watch on YouTube
            </a>

            <script>
                function loadVideo() {
                    document.getElementById("video-container").innerHTML = `
                        <iframe width="100%" height="315"
                            src="https://www.youtube.com/embed/{{ movie.trailer_id }}?rel=0&enablejsapi=1"
                            loading="lazy"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen>
                        </iframe>
                    `;
                }
            </script>

        {% else %}
            <p>Trailer not available</p>
        {% endif %}

        <a href="/booking/?movie={{ movie.title }}" style="
            display:inline-block;
            margin-top:15px;
            padding:10px 15px;
            background:green;
            color:white;
            text-decoration:none;
            border-radius:5px;">
            Book Now
        </a>

        <br><br>

        <a href="/" style="text-decoration:none;">← Back to Home</a>
    </div>
</div>
